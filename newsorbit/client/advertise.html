<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Advertise | NewsOrbit</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/styles.css"></head><body>
<div class="container py-4"><a href="dashboard.html" class="btn btn-outline-light btn-sm">← Back</a><div class="glass p-4 mt-3"><h3>Create Campaign</h3>
<form onsubmit="createCampaign(event)"><div class="row g-2"><div class="col-md-6"><input id="adTitle" class="form-control" placeholder="Campaign title" required></div><div class="col-md-6"><input id="adImage" class="form-control" placeholder="Image URL" required></div><div class="col-md-4"><input id="adCountry" class="form-control" placeholder="Country code" value="us"></div><div class="col-md-4"><input id="adCategory" class="form-control" placeholder="Category" value="general"></div><div class="col-md-4"><input id="adBudget" type="number" class="form-control" placeholder="Budget" required></div><div class="col-12"><button class="btn btn-info">Launch</button></div></div></form></div>
<div class="glass p-4 mt-3"><h4>Analytics</h4><p id="analytics"></p><div class="table-responsive"><table class="table table-dark table-striped"><thead><tr><th>Title</th><th>Country</th><th>Category</th><th>Budget</th><th>Spent</th><th>Impressions</th><th>Clicks</th><th>Status</th></tr></thead><tbody id="adRows"></tbody></table></div></div></div>
<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="appToast" class="toast"><div class="toast-body" id="toastBody"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="js/app.js"></script><script src="js/ads.js"></script><script>loadMyAds();</script></body></html>
