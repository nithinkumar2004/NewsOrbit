<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login | NewsOrbit</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/styles.css"></head><body class="d-flex align-items-center">
<div class="container"><div class="row justify-content-center"><div class="col-md-5"><div class="glass p-4">
<h3 class="mb-3">Sign in</h3>
<button class="btn btn-light w-100 mb-3" onclick="googleLogin()">Continue with Google</button>
<div id="recaptcha-container" class="mb-2"></div>
<div class="input-group mb-2"><input id="phone" class="form-control" placeholder="+1xxxxxxxxxx"><button class="btn btn-info" onclick="sendOtp()">Send OTP</button></div>
<div class="input-group"><input id="otp" class="form-control" placeholder="OTP"><button class="btn btn-success" onclick="verifyOtp()">Verify</button></div>
</div></div></div></div>
<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="appToast" class="toast"><div class="toast-body" id="toastBody"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="js/app.js"></script><script>
let confirmationResult;
const appVerifier=new firebase.auth.RecaptchaVerifier('recaptcha-container', {size:'normal'});
async function googleLogin(){try{await firebaseGoogleLogin();location.href='dashboard.html';}catch(e){showToast(e.message);}}
async function sendOtp(){try{confirmationResult=await firebasePhoneLogin(phone.value,appVerifier);showToast('OTP sent');}catch(e){showToast(e.message)}}
async function verifyOtp(){try{const result=await confirmationResult.confirm(otp.value);const idToken=await result.user.getIdToken();await backendLogin(idToken);location.href='dashboard.html';}catch(e){showToast(e.message)}}
</script></body></html>
