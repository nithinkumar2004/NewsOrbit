<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard | NewsOrbit</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/styles.css"></head><body>
<nav class="navbar navbar-dark"><div class="container"><a class="navbar-brand" href="index.html">🌍 NewsOrbit</a><div><button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">🌓</button><a href="advertise.html" class="btn btn-info btn-sm">Advertise</a></div></div></nav>
<div class="container py-3"><div class="glass p-3 mb-3"><div class="row g-2"><div class="col-md-4"><select id="country" class="form-select"><option value="us">United States</option><option value="in">India</option><option value="gb">United Kingdom</option></select></div><div class="col-md-4"><select id="category" class="form-select"><option>general</option><option>business</option><option>technology</option><option>sports</option></select></div><div class="col-md-4"><button class="btn btn-light w-100" onclick="loadNews()">Load News</button></div></div></div>
<div id="newsGrid" class="row g-3"></div></div>
<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="appToast" class="toast"><div class="toast-body" id="toastBody"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="js/app.js"></script><script src="js/dashboard.js"></script></body></html>
